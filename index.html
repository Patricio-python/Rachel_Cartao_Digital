<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartão Digital - Rachel Trajes Finos</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Tangerine">
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Arial", sans-serif;
        background: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .card {
        background: black;
        width: 360px;
        padding: 25px;
        border-radius: 15px;
        text-align: center;
    }

    .card h1 {
        font-size: 80px;
        font-family:'Tangerine', serif;
        margin-bottom: 15px;
        color: goldenrod;
    }

    .card h2 {
        font-size: 40px;
        font-family:'Tangerine', serif;
        font-weight: 300;
        margin-top: 0;
        color: gold;
    }

    .divider {
        width: 60%;
        margin: 15px auto;
        border-bottom: 2px solid #999;
    }

    .address {
        font-family:'Tangerine', serif;
        font-size: 30px;
        font-weight: bold;
        color: goldenrod;
    }

    .buttons {
        margin-top: 25px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .btn {
        display: block;
        padding: 12px;
        background: black;
        color: goldenrod;
        text-decoration: none;
        font-size: 30px;
        font-family:'Tangerine', serif;
        border: 2px solid goldenrod;
        border-radius: 8px;
        font-weight: bold;
        transition: 0.3s;
    }

    .btn:hover {
        background: #333;
    }

    img {
        width: 100%;
        border-radius: 12px;
        margin-bottom: -60px;
        margin-top: 15px;
    }
</style>

</head>
<body>

<div class="card">
    <img src="logo.jpg" alt="Foto da loja">

    <h1>Trajes Finos</h1>
    <h2>Aluguel de Trajes</h2>

    <div class="divider"></div>

    <p class="address">Av. Gentil Bittencourt, 2200 - São Brás</p>


    <div class="buttons">
        <a class="btn" href="https://wa.me/559181476272" target="_blank">Raquel</a>
        <a class="btn" href="https://wa.me/c/559188686763" target="_blank">Catalogo</a>
        <a class="btn" href="https://www.instagram.com/rachel_trajesfinos" target="_blank">Instagram</a>
        <a class="btn" href="https://maps.app.goo.gl/8xEXKDoF5YBJbnMg7" target="_blank">Localização</a>
    </div>

</div>

</body>
</html>
